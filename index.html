// إنشاء القصص
const container = document.getElementById("storyContainer");

function displayStories(stories){
    container.innerHTML = "";
    stories.forEach(story => {
        const div = document.createElement("div");
        div.classList.add("story");
        div.innerHTML = `
            <h2>${story.number}. ${story.title}</h2>
            <img src="${story.image}" alt="${story.title}">
            <p class="short">${story.shortDesc}</p>
            <p class="full">${story.fullDesc}</p>
            <button onclick="toggleFull(this)">Read More</button>
        `;
        container.appendChild(div);
    });
}

// Read More toggle
function toggleFull(btn){
    const full = btn.parentElement.querySelector(".full");
    if(full.style.display==="none" || full.style.display===""){
        full.style.display="block";
        btn.textContent="Read Less";
    } else {
        full.style.display="none";
        btn.textContent="Read More";
    }
}

// Search
const searchInput = document.getElementById("search");
searchInput.addEventListener("input", () => {
    const query = searchInput.value.toLowerCase();
    const filtered = storyData.filter(s => s.title.toLowerCase().includes(query) || s.shortDesc.toLowerCase().includes(query) || s.fullDesc.toLowerCase().includes(query));
    displayStories(filtered);
});

// عرض كل القصص أول مرة
displayStories(storyData);
