<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>300 English Stories</title>
<style>
body { font-family: Arial, sans-serif; background:#111; color:white; margin:0; padding:0; }
.container { max-width:1200px; margin:auto; padding:20px; }
h1 { text-align:center; }
.story { border:1px solid #444; margin:10px 0; padding:10px; border-radius:8px; background:#222; }
img { width:100%; max-width:300px; height:180px; object-fit:cover; display:block; margin-bottom:10px; border-radius:5px; }
.full { display:none; margin-top:10px; }
button { margin-top:5px; padding:5px 10px; border:none; background:#555; color:white; cursor:pointer; border-radius:5px; }
button:hover { background:#777; }
#search { width:100%; padding:10px; margin:20px 0; border-radius:5px; border:none; }
</style>
</head>
<body>

<div class="container">
<h1>300 English Stories</h1>
<input id="search" placeholder="Search stories..." onkeyup="searchStories()">

<div id="stories">

<script>
// Array of sample story titles and short/long descriptions
const storyData = [
{
title:"The Quiet Student",
shortDesc:"A silent boy everyone thought was stupid.",
fullDesc:"In a small American school, a quiet boy named Ethan was ignored by everyone. Students mocked him, thinking he was slow. But one day, during a crisis, Ethan solved a complex problem faster than anyone. It turned out he was a genius who simply hated attention."
},
{
title:"The Fake Genius",
shortDesc:"He acted smart, but reality was different.",
fullDesc:"Mark always pretended to be intelligent. He used big words and acted confident. But when a real challenge appeared, he froze. This story shows how confidence without real skill eventually collapses."
},
{
title:"The Hidden Hacker",
shortDesc:"A teenager secretly learning hacking.",
fullDesc:"Alex spent nights learning coding and cybersecurity. While others played games, he built tools and tested systems. One day, he prevented a real cyber attack in his school network."
},
{
title:"The School Bully",
shortDesc:"A bully meets unexpected resistance.",
fullDesc:"Jake ruled the school with fear. Until one quiet student stood up to him. Not with violence, but intelligence and strategy. The bully lost his power overnight."
},
{
title:"The Lonely Genius",
shortDesc:"Being smart made him isolated.",
fullDesc:"Daniel understood things faster than everyone. But that made him different. No friends, no connection. Until he met someone who saw beyond intelligence."
},
{
title:"The Exam Trick",
shortDesc:"A clever student beats the system.",
fullDesc:"During a difficult exam, Sarah didn’t cheat. She simply understood the pattern of questions and predicted them perfectly."
},
{
title:"The Fear of Failure",
shortDesc:"Smart but afraid to try.",
fullDesc:"Kevin knew he was smart, but fear stopped him. He avoided challenges until one day he had no choice but to face his fear."
},
{
title:"The Silent Observer",
shortDesc:"He noticed everything.",
fullDesc:"While others talked, Liam observed. He knew secrets, patterns, and behaviors. That made him powerful in ways no one understood."
},
{
title:"The Online Identity",
shortDesc:"Different person online.",
fullDesc:"Emma was shy in real life but confident online. Her digital life slowly began to affect her real personality."
},
{
title:"The Unexpected Winner",
shortDesc:"No one believed he could win.",
fullDesc:"Everyone laughed at Noah. But when competition day came, he shocked everyone with his preparation."
},
{
title:"The Code Breaker",
shortDesc:"Solving impossible puzzles.",
fullDesc:"A student solved codes no teacher could understand, revealing hidden messages in school systems."
},
{
title:"The Smart Dropout",
shortDesc:"Left school but not learning.",
fullDesc:"He dropped out, but continued learning alone, eventually becoming more successful than his classmates."
},
{
title:"The Social Mask",
shortDesc:"Pretending to fit in.",
fullDesc:"She acted like everyone else, hiding her true personality to avoid rejection."
},
{
title:"The Rivalry",
shortDesc:"Two students competing.",
fullDesc:"Their competition pushed both to become better, but also revealed their weaknesses."
},
{
title:"The Secret Project",
shortDesc:"Working on something big.",
fullDesc:"A student secretly built a powerful app that later changed his life."
},
{
title:"The Late Realization",
shortDesc:"Understanding too late.",
fullDesc:"He realized his potential only after wasting years ignoring it."
},
{
title:"The Manipulator",
shortDesc:"Controlling others quietly.",
fullDesc:"A student learned how to influence people without them noticing."
},
{
title:"The Observer",
shortDesc:"Watching silently.",
fullDesc:"He learned more by watching others than by talking."
},
{
title:"The Turning Point",
shortDesc:"A moment that changed everything.",
fullDesc:"One event pushed him to change his entire life path."
},
{
title:"The Real Genius",
shortDesc:"Not what people expect.",
fullDesc:"True intelligence is not loud. It’s quiet, patient, and powerful."
}
];

// Generate HTML for all stories
storyData.forEach((story,i)=>{
  document.write(`
    <div class="story">
      <img src="https://picsum.photos/seed/${i}/300/180" onerror="this.src='https://via.placeholder.com/300x180?text=Story+Image'">
      <h2>${story.title}</h2>
      <p>${story.shortDesc}</p>
      <p class="full">${story.fullDesc}</p>
      <button onclick="toggle(this)">Read More</button>
    </div>
  `);
});

// Toggle function for Read More buttons
function toggle(btn){
  const fullText = btn.previousElementSibling;
  if(fullText.style.display === "block"){
    fullText.style.display = "none";
    btn.innerText = "Read More";
  }else{
    fullText.style.display = "block";
    btn.innerText = "Read Less";
  }
}

// Search function
function searchStories(){
  const input = document.getElementById("search").value.toLowerCase();
  const stories = document.getElementsByClassName("story");
  for(let i=0;i<stories.length;i++){
    const text = stories[i].innerText.toLowerCase();
    stories[i].style.display = text.includes(input) ? "block" : "none";
  }
}
</script>

</div>
</div>

</body>
</html>
