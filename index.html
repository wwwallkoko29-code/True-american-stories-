function renderStories(){
const container = document.getElementById("stories");
container.innerHTML = "";
storyData.forEach((story)=>{
container.innerHTML += `
<div class="story">
<h2>${story.number}. ${story.title}</h2>
<img src="${story.image}" onerror="this.src='https://via.placeholder.com/400x200'">
<p>${story.shortDesc}</p>
<p class="full">${story.fullDesc}</p>
<button onclick="toggle(this)">Read More</button>
</div>
`;
});
}

function toggle(btn){
let full = btn.previousElementSibling;
if(full.style.display === "block"){
full.style.display = "none";
btn.innerText = "Read More";
}else{
full.style.display = "block";
btn.innerText = "Read Less";
}
}

function searchStories(){
let input = document.getElementById("search").value.toLowerCase();
let stories = document.getElementsByClassName("story");
for(let i=0;i<stories.length;i++){
let text = stories[i].innerText.toLowerCase();
stories[i].style.display = text.includes(input) ? "block" : "none";
}
}
